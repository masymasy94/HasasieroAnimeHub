name: Build, Push and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  COMPOSE_FILE: /home/masy/Desktop/docker/homeserver/docker-compose.yml

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    if: contains(github.event.head_commit.message, 'RELEASE')
    runs-on: [self-hosted, homeserver]
    permissions:
      packages: read

    steps:
      - name: Log in to Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull new image
        run: docker compose -f ${{ env.COMPOSE_FILE }} pull animehub

      - name: Recreate container
        run: docker compose -f ${{ env.COMPOSE_FILE }} up -d animehub

      - name: Wait for health check
        run: |
          echo "Waiting for container to become healthy..."
          for i in $(seq 1 20); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' animehub 2>/dev/null || echo "starting")
            echo "  Attempt $i/20: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Container is healthy!"
              exit 0
            fi
            sleep 5
          done
          echo "WARNING: Container did not become healthy within 100s"
          docker logs --tail 20 animehub
          exit 1
